name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: lab4a
      id: lab4a
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab4a
        setup-command: python3 ./CheckLab4.py -f -v
        command: python3 ./CheckLa4a.py -f -v lab4a
        timeout: 10
        max-score: 1
    - name: lab4b
      id: lab4b
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab4b
        setup-command: python3 ./CheckLab4.py -f -v
        command: python3 ./CheckLab4.py -f -v lab4b
        timeout: 10
        max-score: 1
    - name: lab4c
      id: lab4c
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab4c
        setup-command: python3 ./CheckLab4.py -f -v
        command: python3 ./CheckLab4.py -f -v lab4c
        timeout: 10
        max-score: 1
    - name: lab4d
      id: lab4d
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab4d
        setup-command: python3 ./CheckLab4.py -f -v
        command: python3 ./CheckLab4.py -f -v lab4d
        timeout: 10
        max-score: 1
    - name: lab4e
      id: lab4e
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab4e
        setup-command: python3 ./CheckLab4.py -f -v
        command: python3 ./CheckLab4.py -f -v lab4e
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        LAB4A_RESULTS: "${{steps.lab4a.outputs.result}}"
        LAB4B_RESULTS: "${{steps.lab4b.outputs.result}}"
        LAB4C_RESULTS: "${{steps.lab4c.outputs.result}}"
        LAB4D_RESULTS: "${{steps.lab4d.outputs.result}}"
        LAB4E_RESULTS: "${{steps.lab4e.outputs.result}}"
      with:
        runners: lab4a,lab4b,lab4c,lab4d,lab4e
